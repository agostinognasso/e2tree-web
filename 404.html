<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1f40">
  <title>Page not found · e2tree</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="images/e2tree_logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT@0,9..144,300..700,0..100;1,9..144,300..700,0..100&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* Self-contained: this page must render even when the stylesheet cannot be
       resolved (a 404 can be served from any path, and the file is often opened
       directly from disk). Nothing here depends on css/style.css. */
    :root {
      --e2-dark: #2d4e84;
      --e2-deep: #0d1f40;
      --ink: #0e1520;
      --ink-soft: #2c3545;
      --rule: #d4d8e2;
      --paper: #f8f9fc;
      --font-display: "Fraunces", "Cormorant Garamond", Georgia, serif;
      --font-body: "Instrument Sans", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: "JetBrains Mono", ui-monospace, monospace;
      --ease: cubic-bezier(.22,.61,.36,1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem clamp(1.25rem, 4vw, 2.25rem);
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .wrap { max-width: 640px; text-align: center; }

    .code-block {
      display: inline-block;
      text-align: left;
      background: var(--e2-deep);
      color: #c9d8f4;
      border-radius: 10px;
      padding: 1.25rem 1.75rem;
      margin-bottom: 2.5rem;
      font-family: var(--font-mono);
      font-size: .82rem;
      line-height: 1.7;
      white-space: pre;
      overflow-x: auto;
      max-width: 100%;
    }
    .code-block .comment { color: #5f7a9e; }
    .code-block .fn      { color: #7cc5e8; }
    .code-block .str     { color: #a8d4a0; }

    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-weight: 400;
      font-size: clamp(2.2rem, 6vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: -0.03em;
      font-variation-settings: "opsz" 144, "SOFT" 30;
    }
    h1 em {
      font-style: italic;
      color: var(--e2-dark);
      font-variation-settings: "opsz" 144, "SOFT" 100;
    }

    .lede {
      font-family: var(--font-display);
      font-size: clamp(1.05rem, 1.5vw, 1.3rem);
      font-weight: 350;
      font-variation-settings: "opsz" 30, "SOFT" 50;
      line-height: 1.5;
      color: var(--ink-soft);
      max-width: 30em;
      margin: 1.5rem auto 0;
    }

    .actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2.25rem;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      padding: .85rem 1.6rem;
      border-radius: 999px;
      font-size: .95rem;
      font-weight: 600;
      font-family: var(--font-body);
      text-decoration: none;
      border: none;
      transition: all .2s var(--ease);
    }
    /* The bug that broke this page unstyled: without a width the inline SVG
       expands to fill its container. Constrain it explicitly. */
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    .btn-primary { background: var(--e2-deep); color: #fff; }
    .btn-primary:hover { background: var(--e2-dark); transform: translateY(-2px); box-shadow: 0 8px 20px -8px rgba(13,31,64,.4); }

    .btn-ghost { background: transparent; color: var(--ink-soft); border: 1.5px solid var(--rule); }
    .btn-ghost:hover { border-color: var(--e2-dark); color: var(--e2-deep); transform: translateY(-1px); }

    @media (max-width: 430px) {
      .btn { width: 100%; justify-content: center; }
      .code-block { font-size: .74rem; padding: 1rem 1.1rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      .btn { transition: none; }
      .btn:hover { transform: none; }
    }
  </style>
</head>
<body>

  <main class="wrap">
    <div class="code-block"><span class="comment"># Error: node not found</span>
<span class="fn">predict</span>(tree, newdata = <span class="str">"this page"</span>)
<span class="comment">#&gt; NULL — no terminal node matches this path</span></div>

    <h1>This branch was <em>pruned</em>.</h1>

    <p class="lede">
      The page you are looking for does not exist or has moved.
      Let's route you back to a valid node.
    </p>

    <div class="actions">
      <a href="index.html" class="btn btn-primary">
        Back to the root
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
      </a>
      <a href="documentation.html" class="btn btn-ghost">
        Documentation
      </a>
    </div>
  </main>

  <script>
    // GitHub Pages serves this file for a missing URL at any depth, where the
    // relative hrefs above would resolve against the requested directory rather
    // than the site root. Rewrite them against the site root.
    //   custom domain (e2tree.agostinognasso.com) -> the root is "/"
    //   *.github.io project page                  -> the root is the first path
    //                                                segment, so renaming the
    //                                                repository needs no change
    // Opened straight from disk (file://) the relative hrefs already work.
    (function () {
      if (!/^https?:$/.test(location.protocol)) return;
      var root = '/';
      if (/\.github\.io$/.test(location.hostname)) {
        var segment = location.pathname.split('/')[1];
        if (segment) root = '/' + segment + '/';
      }
      document.querySelectorAll('a[href]').forEach(function (a) {
        var href = a.getAttribute('href');
        if (/^([a-z]+:|\/|#)/i.test(href)) return;
        a.setAttribute('href', root + (href === 'index.html' ? '' : href));
      });
    })();
  </script>

</body>
</html>
